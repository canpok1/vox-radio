name: build

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'

    - name: Setup
      run: make setup

    - name: Verify Go Formatting
      run: |
        make fmt
        git diff --exit-code

    - name: Lint
      run: make lint

    - name: Test
      run: make test

    - name: Build
      run: make build

    - name: Validate sample configs
      run: make check-samples

  e2e:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'

    - name: Install ffmpeg
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

    - name: E2E
      run: make e2e
