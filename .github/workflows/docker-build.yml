name: docker-build

# PR で Docker イメージの実ビルドを検証する（push はしない）。
# 本番リリースと同じ .goreleaser.yaml を snapshot モードで実行し、
# Dockerfile・ffmpeg 導入・amd64/arm64 のマルチアーキビルドが通ることを確認する。
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      # arm64 をエミュレートしてビルドするため QEMU と Buildx を用意する。
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # snapshot かつ publish スキップで、イメージのビルドのみ行い push はしない。
      - name: Build images (snapshot, no push)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # publish はスキップするが、cask 設定のテンプレート評価で参照されるためダミーで渡す。
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
