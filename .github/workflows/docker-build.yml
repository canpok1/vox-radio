name: docker-build

# PR で Docker イメージの実ビルドを検証する（push はしない）。
# 本番リリースと同じ .goreleaser.yaml を snapshot モードで実行し、
# Dockerfile・ffmpeg 導入・amd64/arm64 のマルチアーキビルドが通ることを確認する。
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      # arm64 をエミュレートしてビルドするため QEMU と Buildx を用意する。
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # snapshot かつ publish スキップで、イメージのビルドのみ行い push はしない。
      - name: Build images (snapshot, no push)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # publish はスキップするが、cask 設定のテンプレート評価で参照されるためダミーで渡す。
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ビルドしたイメージを実際に起動し、想定どおり機能するか検証する（amd64・push なし）。
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      # 本番と同じ Dockerfile に渡すため、まず vox-radio バイナリをビルドする。
      - name: Build binary
        run: make build

      - name: Build image (amd64, local tag)
        run: docker build -t vox-radio:smoke .

      - name: Smoke test
        run: |
          set -euxo pipefail
          # 基本動作: バージョン表示とヘルプ（サブコマンド一覧）
          docker run --rm vox-radio:smoke --version
          docker run --rm vox-radio:smoke --help > /dev/null
          # 同梱依存の確認: ffmpeg / ffprobe が利用できる
          docker run --rm --entrypoint ffmpeg vox-radio:smoke -version | head -n1
          docker run --rm --entrypoint ffprobe vox-radio:smoke -version | head -n1
          # 実利用に近い検証: マウントしたディレクトリに init で設定生成 → 各 check
          mkdir -p smoke
          docker run --rm -v "$PWD/smoke:/work" -w /work vox-radio:smoke init --sample --output-dir .
          docker run --rm -v "$PWD/smoke:/work" -w /work vox-radio:smoke config check
          docker run --rm -v "$PWD/smoke:/work" -w /work vox-radio:smoke episodegen check episode-spec.yaml
