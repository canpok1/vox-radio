llm:
  provider: openai
  temperature: 0.7
  max_retries: 3
  min_request_interval_ms: 4500
  steps:
    summarize: { temperature: 0.2 }
    plan: { temperature: 0.4 }
    write: { temperature: 0.8 }
    direct: { temperature: 0.2 }
  openai:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    api_key_env: GEMINI_API_KEY
    model: gemini-3.1-flash-lite

voicevox:
  url: http://localhost:50021

cache:
  max_entries: 100
  retention_days: 90
  llm_context_entries: 10

characters:
  zundamon:
    name: ずんだもん
    pronoun: ボク
    speech_suffix: ["〜のだ", "〜なのだ"]
    personality: ["元気", "明るい", "素直", "前向き", "好奇心旺盛", "おっちょこちょい"]
    default_style: ノーマル
    styles:
      ノーマル: 3
      あまあま: 1
      なみだめ: 76
    credit: "VOICEVOX:ずんだもん"
  metan:
    name: 四国めたん
    pronoun: わたくし
    speech_suffix: ["〜かしら", "〜だわ", "〜ですわ"]
    personality: ["お嬢様", "しっかり者", "世話好き"]
    default_style: ノーマル
    styles:
      ノーマル: 2
      あまあま: 0
      ツンツン: 6
    credit: "VOICEVOX:四国めたん"
