program:
  id: "vox-radio-demo"
  # 単発番組モード。連続性のないデモ番組のため回番号（第N回）を採番・露出しない。
  # 出力ファイル名は vox-radio-demo.mp3（サフィックス無し）になり、キャッシュにも保存しない。
  single_shot: true
  title: "ずんだもんとめたんのvox-radio紹介ラジオ"
  description: "生成AIとVOICEVOXで“自分だけのラジオ番組”を手軽に作れるCLIツール vox-radio。その魅力を、ずんだもんとめたんがやさしく紹介するデモ番組です。"
  script_note: "vox-radio の機能を正確に紹介すること。VOICEVOX・生成AI(Gemini)・RSSフィード配信・Slack投稿・コーディングエージェント・CLI などの固有名詞は正しく言及する。番組生成の内部ステップ名や処理段階の細部には立ち入らず、利用者目線のうれしさで語る。専門用語はやさしく噛み砕いて説明する。番組全体を約3分に収めるため、各セリフは1〜2文で簡潔に、掛け合いは短くテンポよくまとめる。冗長な相槌や同じ説明の繰り返しは避ける。この番組の一番の魅力は『自分専用のラジオ番組を手軽に作れる』こと。好きなテーマ・好きなキャラで自分のために番組を作って楽しめる点を主役に語る。RSS配信やSlack投稿などで世界に公開することもできるが、それは“やりたい人向けの追加機能”として軽く触れる程度にとどめ、公開を煽らない。世界に公開する場合は、使う素材—VOICEVOXのキャラクター音声、BGMや効果音などの音声素材、RSSフィードの記事—の利用規約（クレジット表記など）を守る必要がある。ただしこの公開時の注意は番組内で繰り返さず、エンディングで1回だけ一言添えるにとどめ、他のコーナーでは触れないこと。"
  summary_length: 200
  chars_per_minute: 240

casts:
  zundamon:
    type: regular
    role: "MC。進行役。素朴な疑問やリアクションで盛り上げる聞き役。元気なボケ担当。"
  metan:
    type: regular
    role: "MC。vox-radio の機能を紹介・解説する主担当。落ち着いたツッコミ役。"

corner_defaults:
  bgm: coffee_break
  end_audio:
    type: se
    id: switch

corners:
  - id: "opening"
    title: "オープニング"
    content: "明るく挨拶し、この番組がCLIツール vox-radio の機能紹介デモだと手短に伝える。vox-radio は設定ファイルを元に、生成AIとVOICEVOXで“自分だけのラジオ番組”を手軽に作れるツールだと一言で紹介し、今日の流れをさっと予告する。"
    direction: "テンポよく明るく。"
    cast:
      zundamon: "MC。元気に挨拶する進行役。ボケ担当。"
      metan: "MC。番組のねらいを紹介する相棒。"
    length_sec: 15
    summary_length: 60
    start_audio:
      type: jingle
      id: theme
    end_pause_sec: 1.5

  - id: "how-it-works"
    title: "vox-radioのしくみ"
    content: "vox-radio で番組ができる流れを手短に紹介する。設定ファイルに番組のテーマ・出演キャラ・コーナー構成を書くと、台本は生成AIが自動で執筆し、音声はVOICEVOXのキャラクターボイスで読み上げ、1本のmp3に仕上がる。RSSフィードやWeb記事を素材にすれば最新の話題も扱える点に軽く触れ、コマンドひとつで完成することを強調する。"
    cast:
      metan: "MC。しくみをやさしく紹介・解説する主担当。"
      zundamon: "MC。素朴な疑問やリアクションを返す聞き役。ボケ担当。"
    length_sec: 45
    summary_length: 100
    end_pause_sec: 1.5

  - id: "features"
    title: "便利な機能たち"
    content: "vox-radio の便利な機能を、自分専用ラジオを楽しむ視点で手短に紹介する。(1) RSSフィードやWeb記事を素材にすれば、自分の好きなテーマ・最新の話題で番組を作れる。(2) BGM・ジングル・効果音で番組を自分好みに演出できる(この番組にも使用)。(3) コーディングエージェントに『番組を作って』と頼めば設定づくりを任せられる。そのうえで、作った番組はRSS配信やSlack投稿で家族や仲間と共有・公開することもできる(やりたい人向けの追加機能)と軽く添える。各機能はテンポよく短く。なお利用規約に関する注意はここでは触れず、エンディングにまとめる。"
    cast:
      metan: "MC。便利機能を順に紹介・解説する主担当。"
      zundamon: "MC。へぇと感心したり使ってみたくなる聞き役。ボケ担当。"
    length_sec: 55
    summary_length: 100
    end_pause_sec: 1.5

  - id: "ending"
    title: "エンディング"
    content: "使い始め方を手短に案内して締める。インストールしてサンプル設定を生成し、コマンドひとつで自分だけの番組が作れることを伝える。そして番組内で唯一ここでだけ、作った番組を世界に公開する場合は、使う素材—キャラクターの音声・BGMや効果音・RSSフィードの記事—それぞれの利用規約（クレジット表記など）を守ってね、と一言だけ注意を添えてから、ぜひ試してほしいと明るく締めくくる。"
    direction: "余韻を残しつつ明るく。"
    cast:
      zundamon: "MC。進行役。ボケ担当。"
      metan: "MC。相棒。ツッコミ担当。"
    length_sec: 30
    summary_length: 60
    end_audio:
      type: jingle
      id: theme

assets_files:
  - ../sample-assets/assets.yaml
