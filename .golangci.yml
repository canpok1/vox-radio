version: "2"

run:
  timeout: 5m
  tests: true

output:
  formats:
    text:
      path: stdout
  sort-results: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gocyclo
    - misspell
    - unconvert

  settings:
    gocyclo:
      min-complexity: 30

  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - all
        path: mock_.*\.go

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
