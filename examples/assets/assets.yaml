jingle:
  opening:
    file: jingle/private-time-1.mp3
    fade_in: 0.5
    fade_out: 0.5
    description: "番組冒頭で流すオープニングジングル"
se:
  accent_low:
    file: se/accent-low.mp3
    volume: 0.8
    # trim_silence: true          # 省略時 true（前後の無音を自動除去）
    # trim_silence_threshold: -50 # 省略時 -50（dB）。素材のノイズフロアに合わせて調整
    description: "話題の切り替わりや新コーナー導入時に使うアクセント音"
bgm:
  coffee_break:
    file: bgm/coffee_break_long.mp3
    volume: 0.3
    duck_ratio: 8
    loop: true
    # fade_in: 1.0   # フェードイン秒数（省略時デフォルト 1.0 秒）
    # fade_out: 1.0  # フェードアウト秒数（省略時デフォルト 1.0 秒）。0 指定でフェードなし
    description: "雑談・ゆるい話題向けの落ち着いたカフェ風BGM"
