program:
  id: "tech-daily"
  title: "今日のテックニュース"
  description: "毎日5分のニュースラジオ"

corners:
  - title: "オープニング"
    content: "元気に挨拶と自己紹介。ずんだもんからプライベートな出来事を1つ話し、ちょっとした雑談をする。"
    direction: "冒頭でオープニングジングルを流す。"
    cast:
      zundamon: "MC。元気に挨拶する進行役。ボケ担当。"
      metan: "MC。ずんだもんの相棒。ツッコミ担当。"
    length_sec: 30
    start_jingle: opening  # コーナー開始ジングル
  - title: "今日のテックニュース"
    content: "テック記事を2〜3本、漫才風に噛み砕いて紹介"
    cast:
      zundamon: "MC。ボケ担当、あまり詳しくない設定。"
      metan: "MC。解説役、ツッコミ担当。"
    length_sec: 180
    bgm: coffee_break  # コーナー中BGM
    source:
      feeds:
        - url: https://zenn.dev/feed
          max_items: 5
        - url: https://qiita.com/popular-items/feed
          max_items: 5
  - title: "リスナー Q&A"
    content: "リスナーからの質問や投稿を紹介して語り合う。"
    cast:
      zundamon: "MC。元気に読み上げる進行役。ボケ担当。"
      metan: "MC。ずんだもんに突っ込む。ツッコミ担当。"
    length_sec: 120
    condition:
      every: 2                  # 偶数回（2,4,6,…）に採用

  - title: "今週のピックアップ記事"
    content: "編集部おすすめのテック記事を1本深掘りして紹介。"
    cast:
      zundamon: "MC。ボケ担当。記事を読んだことがない設定。"
      metan: "MC。解説役。ツッコミ担当。"
    length_sec: 120
    source:
      feeds:
        - url: https://zenn.dev/feed
          max_items: 3
    condition:
      not:
        every: 2                  # 偶数でない回（=奇数回）に採用

  - title: "エンディング"
    content: "次回も聴いて欲しいという宣伝をする。"
    direction: "エンディングでまとめる。"
    cast:
      zundamon: "MC。進行役。ボケ担当。"
      metan: "MC。相棒。ツッコミ担当。"
    length_sec: 30

# ゲスト設定（省略可）
# キー = vox-radio.yaml の characters に定義済みのキャラID
# 合致した回はオープニングからエンディングまで全コーナーに出演する
# guests:
#   zunko:
#     role: 古参リスナー出身の常連ゲスト
#     condition:
#       episodes: [3, 10, 20]   # 第3回・第10回・第20回に登場
#   metan:
#     role: 業界に詳しい解説ゲスト
#     condition:
#       every: 5                # 5, 10, 15, … の回に登場（定期出演）
#   sora:
#     role: フリーランスエンジニア
#     condition:
#       not:
#         every: 5              # 5の倍数以外の回（zunkoがいない回）に登場

# アセット設定ファイルのパス（このプロファイルファイルからの相対パス）
# アセット設定ファイル内のfileパスはアセット設定ファイルのディレクトリを基準に解決される
assets_files:
  - assets/assets.yaml
