program:
  id: "tech-daily"
  title: "今日のテックニュース"
  description: "毎日5分のニュースラジオ"

corners:
  - title: "オープニング"
    content: "元気に挨拶と自己紹介。ずんだもんからプライベートな出来事を1つ話し、ちょっとした雑談をする。"
    direction: "冒頭でオープニングジングルを流す。"
    cast:
      zundamon: "MC。元気に挨拶する進行役。ボケ担当。"
      metan: "MC。ずんだもんの相棒。ツッコミ担当。"
    length_sec: 30
    start_jingle: opening  # コーナー開始ジングル
  - title: "今日のテックニュース"
    content: "テック記事を2〜3本、漫才風に噛み砕いて紹介"
    cast:
      zundamon: "MC。ボケ担当、あまり詳しくない設定。"
      metan: "MC。解説役、ツッコミ担当。"
    length_sec: 180
    bgm: coffee_break  # コーナー中BGM
    source:
      feeds:
        - url: https://zenn.dev/feed
          max_items: 5
        - url: https://qiita.com/popular-items/feed
          max_items: 5
  - title: "エンディング"
    content: "次回も聴いて欲しいという宣伝をする。"
    direction: "エンディングでまとめる。"
    cast:
      zundamon: "MC。進行役。ボケ担当。"
      metan: "MC。相棒。ツッコミ担当。"
    length_sec: 30

assets:
  jingle:
    opening:
      file: assets/jingle/private-time-1.mp3
      fade_in: 0.5
      fade_out: 0.5
      description: "番組冒頭で流すオープニングジングル"
  se:
    accent_low:
      file: assets/se/accent-low.mp3
      volume: 0.8
      description: "話題の切り替わりや新コーナー導入時に使うアクセント音"
  bgm:
    coffee_break:
      file: assets/bgm/coffee_break_long.mp3
      volume: 0.3
      duck_ratio: 8
      loop: true
      # fade_in: 1.0   # フェードイン秒数（省略時デフォルト 1.0 秒）
      # fade_out: 1.0  # フェードアウト秒数（省略時デフォルト 1.0 秒）。0 指定でフェードなし
      description: "雑談・ゆるい話題向けの落ち着いたカフェ風BGM"
