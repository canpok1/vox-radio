program:
  title: "今日のテックニュース"
  description: "毎日5分のニュースラジオ"
  segment_pause_sec: 0.3
  target_duration_sec: 240
  opening_jingle: opening

corners:
  - title: "オープニング"
    content: "番組の挨拶と本日のトピック紹介"
    cast:
      zundamon: "元気に挨拶する進行役"
    target_duration_sec: 30
  - title: "今日のテックニュース"
    content: "テック記事を2〜3本、噛み砕いて紹介"
    cast:
      zundamon: "進行役、ボケ担当、あまり詳しくない設定"
      metan: "解説役、ツッコミ担当"
    target_duration_sec: 180
    source:
      feeds:
        - url: https://zenn.dev/feed
          max_items: 5
        - url: https://qiita.com/popular-items/feed
          max_items: 5
  - title: "エンディング"
    content: "まとめ"
    cast:
      zundamon: "進行役"
    target_duration_sec: 30

assets:
  jingle:
    opening: { file: assets/jingle/private-time-1.mp3, fade_in: 0.5, fade_out: 0.5 }
  se:
    accent_low: { file: assets/se/accent-low.mp3, volume: 0.8 }
  bgm:
    coffee_break: { file: assets/bgm/coffee_break_long.mp3, volume: 0.3, duck_ratio: 8, loop: true }
