program:
  title: "今日のテックニュース"
  description: "毎日5分のニュースラジオ"
  language: ja
  author: vox-radio
  category: News
  explicit: false
  cover_image_url: https://example.github.io/vox-radio/cover.jpg
  site_url: https://example.github.io/vox-radio/
  max_items: 7
  segment_pause_sec: 0.3

corners:
  - title: "オープニング"
    content: "番組の挨拶と本日のトピック紹介"
    cast:
      zundamon: "元気に挨拶する進行役"
    target_chars: 200
  - title: "今日のテックニュース"
    content: "テック記事を2〜3本、噛み砕いて紹介"
    cast:
      zundamon: "司会"
      metan: "解説役"
    target_chars: 1300
    source:
      feeds:
        - url: https://example.com/rss.xml
          max_items: 5
        - url: https://another.example.com/feed
          max_items: 3
      articles:
        - https://example.com/articles/123
  - title: "エンディング"
    content: "まとめと次回予告"
    cast:
      zundamon: "進行役"
    target_chars: 200

assets:
  jingle:
    opening: { file: assets/jingle/opening.mp3, fade_in: 0.5, fade_out: 0.5 }
    ending:  { file: assets/jingle/ending.mp3,  fade_in: 0.5, fade_out: 1.0 }
  se:
    chime:      { file: assets/se/chime.wav,      volume: 0.8 }
    transition: { file: assets/se/transition.wav, volume: 0.8 }
  bgm:
    talk_bgm: { file: assets/bgm/talk.mp3, volume: 0.3, duck_ratio: 8, loop: true }
