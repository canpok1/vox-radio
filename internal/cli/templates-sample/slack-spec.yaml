# これは番組を Slack に投稿するための設定サンプルです。
# 次のコマンドで mp3 を Slack にアップロードし、要約やコーナーをスレッドに投稿します:
#   vox-radio slackpost --manifest (manifest.jsonのパス) --spec sample/slack-spec.yaml
# Slack のトークンは vox-radio.yaml の slack.bot_token_env で指定した環境変数から読み込みます。

# 番組のID（ログや突き合わせ用）。episode-spec.yaml の program.id と合わせておくと分かりやすいです。
program_id: "news-variety"

# Slack 投稿の設定。
slack:
  # 投稿先チャンネルのID（"C" で始まる文字列）。自分のチャンネルIDに置き換えてください。
  # チャンネルIDは Slack のチャンネル詳細画面の最下部などで確認できます。
  channel: "C0123456789"

  # 投稿文のひな型（省略すると組み込みの標準テンプレートを使います）。
  # 使える置き換え語:
  #   {title}           番組タイトル
  #   {episode_number}  回番号（0のときは「第N回」の部分が消えます）
  #   {episode_title}   その回のサブタイトル（空のときは「」が消えます）
  #   {description}     番組説明
  #   {summary}         要約
  #   {datetime}        配信日時
  #   {audio_file}      音声ファイル名
  # コーナー内で追加で使える置き換え語:
  #   {corner_title}    コーナータイトル
  #   {corner_summary}  コーナー要約
  #   {articles}        記事リスト（article のひな型を各記事に当てはめて改行でつなぎます）
  # 記事内で使える置き換え語:
  #   {title}           記事タイトル
  #   {url}             記事URL
  message:
    # 親メッセージ（mp3 をアップロードするときの最初のコメント）。
    header: "🎙️ {title} 第{episode_number}回「{episode_title}」"
    # スレッド返信の通知に使うプレーンテキスト。
    fallback: "{title} 第{episode_number}回 を配信しました"
    # スレッド返信に載せる要約（空のときは省略）。
    summary: "*今回のまとめ*\n{summary}"
    # コーナーごとの本文（{articles} は下の article を展開してつなぎます）。
    corner: "*{corner_title}*\n{corner_summary}\n{articles}"
    # 記事1件分のひな型。
    article: " • <{url}|{title}>"
