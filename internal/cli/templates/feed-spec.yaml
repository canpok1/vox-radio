# feed-spec.yaml - ポッドキャストの配信フィード（RSS）を作るための設定です。
# vox-radio feedgen --cache (キャッシュファイルのパス) --spec feed-spec.yaml で
# feed.xml（配信用の目次ファイル。RSS 2.0 + iTunes 形式）を作れます。
# feed.xml は下の output.public のフォルダに書き出されます。

# 配信フィードに載せる番組情報。
feed:
  # 番組の言語。
  language: "ja"
  # 連絡先メールアドレス。
  email: "you@example.com"
  # ジャンル（Apple Podcasts などのカテゴリ）。不要なら空文字にするとタグが省かれます。
  category: "Technology"
  # 過激な表現を含むか。
  explicit: false
  # 番組のカバー画像のURL。不要なら空文字にするとタグが省かれます。
  cover_image_url: "https://example.com/cover.jpg"
  # 番組のホームページURL。
  site_url: "https://example.com"
  # 各回の音声ファイルのURLのひな型。
  # {episode_number}（回番号）と {audio_file}（音声ファイル名）が自動で置き換わります。
  audio_url_template: "https://example.com/episodes/{episode_number}/{audio_file}"
  # 各回のクレジット表記。不要なら空文字にすると省かれます。
  credit: ""

# 出力先の設定。
output:
  # feed.xml を書き出すフォルダ（省略すると public）。
  public: "public"
