# profile.yaml - プロファイル設定ファイル
# このファイルを編集して番組の構成・コーナー・音声素材のパスを設定してください。
# vox-radio run --profile profile.yaml で実行できます。

# 番組全体の設定
program:
  # 番組ID（キャッシュキー兼ファイル名に使用。未設定時はキャッシュ無効）
  # id: "my-tech-radio"
  # 番組タイトル
  title: "番組タイトル"
  # 番組の説明（LLM への指示に使用）
  description: "番組の説明"

# コーナー定義（番組を構成する各コーナーを順番に記述）
corners:
  - title: "オープニング"
    # コーナーの内容説明（LLM への指示に使用）
    content: "番組の挨拶と本日のトピック紹介"
    # 演出生成 LLM のみに渡る演出専用指示。台本生成には渡らない。（不要な場合は行ごと削除）
    # direction: "明るく元気に。BGM はフェードインで開始。"
    # 出演キャラクター（キャラクターID: 役割の説明）
    # キャラクターIDは vox-radio.yaml の characters のキーと一致させること
    cast:
      zundamon: "元気に挨拶する進行役"
    # このコーナーの目標時間（秒）
    length_sec: 30
    # コーナー開始ジングル（assets.jingle のキー名。不要な場合は行ごと削除）
    # start_jingle: opening
    # コーナー開始前の無音時間（秒）。0 または省略時は挿入しない。
    # start_pause_sec: 1.0
    # コーナー終了後の無音時間（秒）。0 または省略時は挿入しない。
    # end_pause_sec: 1.0

  - title: "メインコーナー"
    content: "メインコンテンツの紹介"
    cast:
      zundamon: "進行役"
      metan: "解説役"
    length_sec: 180
    # コーナー中BGM（assets.bgm のキー名。不要な場合は行ごと削除）
    # bgm: talk_bgm
    # ソース設定（RSSフィードや記事URLからコンテンツを収集する場合に設定）
    # ソースがない場合はこのブロックを省略してください
    source:
      feeds:
        - url: https://example.com/feed
          max_items: 5
      articles: []

  - title: "エンディング"
    content: "まとめと締め"
    cast:
      zundamon: "進行役"
    length_sec: 30
    # コーナー終了ジングル（assets.jingle のキー名。不要な場合は行ごと削除）
    # end_jingle: ending

# アセット設定（ジングル・SE・BGM）
# バイナリ素材ファイルは別途用意してください。
# ファイルパスはこのプロファイルファイルからの相対パスで解決されます。
# 素材が不要な場合はこのセクション全体をコメントアウトするか削除してください。
