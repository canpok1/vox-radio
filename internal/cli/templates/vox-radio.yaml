# vox-radio.yaml - 共通設定ファイル
# このファイルを編集して LLM・VOICEVOX の接続情報とキャラクター設定を行ってください。

# LLM（大規模言語モデル）の接続設定
llm:
  # プロバイダ: openai（デフォルト）または dify-chat
  provider: openai
  # 生成のランダム性（0.0〜1.0）。低いほど安定、高いほど多様な出力になる
  temperature: 0.7
  # APIリトライ回数
  max_retries: 3
  # LLM リクエストの最小インターバル（ミリ秒）。省略時は 4500ms（≈13.3 RPM）が適用される。0 を明示するとスロットリング無効。
  min_request_interval_ms: 4500
  # ステップごとの温度設定（省略時は上記 temperature を使用）
  steps:
    summarize: { temperature: 0.2 }
    plan:      { temperature: 0.4 }
    write:     { temperature: 0.8 }
    direct:    { temperature: 0.2 }
  # OpenAI 互換プロバイダの接続設定（provider: openai 時に必須）
  openai:
    # LLM API のベースURL（OpenAI 互換エンドポイント）
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    # APIキーを格納する環境変数名（export GEMINI_API_KEY=xxx などで設定）
    api_key_env: GEMINI_API_KEY
    # 使用するモデル名
    model: gemini-3.1-flash-lite
  # Dify chat-messages の接続設定（provider: dify-chat 時に必須）
  # dify-chat:
  #   base_url: https://api.dify.ai/v1
  #   api_key_env: DIFY_API_KEY
  #   user: vox-radio            # 利用者識別子（省略時は vox-radio）
  #   inputs:                    # Dify アプリに渡す変数（省略可）
  #     temperature: "${temperature}"   # 完全一致なので数値で送信
  #     lang: ja

# VOICEVOX 音声合成エンジンの接続設定
voicevox:
  # VOICEVOX Engine の URL
  # devcontainer 環境で利用する場合は http://voicevox:50021 に変更してください
  url: http://localhost:50021
  # 抑揚・音高・話速のプリセット定義（省略時はコード組込みのデフォルトプリセットが適用される）
  presets:
    intonation:   # 抑揚 (intonationScale, 0.0〜2.0)
      棒読み: 0.0
      かなり控えめ: 0.3
      控えめ: 0.6
      標準: 1.0
      やや豊か: 1.2
      表現豊か: 1.5
      とても豊か: 1.8
    pitch:        # 音高 (pitchScale, -0.15〜0.15)
      低め: -0.05
      やや低め: -0.033
      わずかに低め: -0.017
      標準: 0.0
      わずかに高め: 0.017
      やや高め: 0.033
      高め: 0.05
    speed:        # 話速 (speedScale, 0.5〜2.0)
      とてもゆっくり: 0.6
      ゆっくり: 0.8
      ややゆっくり: 0.9
      標準: 1.0
      やや早口: 1.1
      早口: 1.2
      とても早口: 1.4

# キャッシュ設定（過去エピソードの記憶）
cache:
  enabled: true            # キャッシュ機能の有効/無効（program.id 未設定時は常に無効）
  max_entries: 100         # JSONL に保持する最大エピソード数（超過分は古い行から削除）
  retention_days: 90       # 保持日数（超過した古い行は削除）
  llm_context_entries: 10  # LLM へ渡す直近エピソード件数

# Slack 投稿設定（slackpost コマンドで使用）
slack:
  # Bot トークン（xoxb-...）を格納する環境変数名
  # export SLACK_BOT_TOKEN=xoxb-xxx などで設定すること
  # 必要なスコープ: chat:write / files:write
  bot_token_env: SLACK_BOT_TOKEN

# キャラクター設定（VOICEVOX の話者IDと紐付け）
# キャラクターIDは corners[].cast のキーとして使用します
characters:
  zundamon:
    name: ずんだもん
    pronoun: ボク
    speech_suffix: ["〜のだ", "〜なのだ"]
    personality: ["元気", "明るい", "素直", "前向き", "おっちょこちょい", "好奇心旺盛"]
    # デフォルトで使用するスタイル名（styles のキーと一致させること）
    default_style: ノーマル
    # スタイル名と VOICEVOX 話者IDの対応
    styles:
      ノーマル: 3
      あまあま: 1
      ツンツン: 7
      セクシー: 5
      ささやき: 22
      ヒソヒソ: 38
      ヘロヘロ: 75
      なみだめ: 76
  zunko:
    name: 東北ずん子
    pronoun: 私
    speech_suffix: ["〜です", "〜ます"]
    personality: ["前向き", "明るい", "母性の塊", "穏やか"]
    default_style: ノーマル
    styles:
      ノーマル: 107
  metan:
    name: 四国めたん
    pronoun: わたくし
    speech_suffix: ["〜かしら", "〜だわ", "〜ですわ"]
    personality: ["お嬢様", "しっかり者", "気まぐれ", "負けず嫌い", "世話好き"]
    default_style: ノーマル
    styles:
      ノーマル: 2
      あまあま: 0
      ツンツン: 6
      セクシー: 4
      ささやき: 36
      ヒソヒソ: 37
