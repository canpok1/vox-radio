# vox-radio.yaml - 番組づくりの共通設定ファイルです。
# 台本の文章を作るAI（LLM）と、文章を音声にする VOICEVOX の接続先、キャラクターを設定します。
# 番組の中身は episode-spec.yaml で決めます。このファイルは「仕組み側」の設定です。

# 台本の文章を作るAI（LLM）の接続設定。
llm:
  # 使うAIサービスの種類。openai（標準）か dify-chat を選びます。
  provider: openai
  # 文章のばらつき具合（0.0〜1.0）。小さいほど安定、大きいほど多彩になります。
  temperature: 0.7
  # 通信に失敗したときのやり直し回数。
  max_retries: 3
  # AIへの問い合わせ間隔の下限（ミリ秒）。省略すると 4500ミリ秒（1分あたり約13回）。0 にすると間隔制限なし。
  min_request_interval_ms: 4500
  # 作業の段階ごとの temperature（省略すると上の temperature を使います）。
  steps:
    summarize: { temperature: 0.2 }
    plan:      { temperature: 0.4 }
    write:     { temperature: 0.8 }
    direct:    { temperature: 0.2 }
  # openai を選んだとき必須の接続設定。
  openai:
    # AIの接続先URL（OpenAI互換のエンドポイント）。
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    # APIキーを入れておく環境変数の名前（例: export GEMINI_API_KEY=xxx で設定）。
    api_key_env: GEMINI_API_KEY
    # 使うAIモデルの名前。
    model: gemini-3.1-flash-lite
  # dify-chat を選んだとき必須の接続設定（使うときだけ行頭の # を外します）。
  # dify-chat:
  #   base_url: https://api.dify.ai/v1
  #   api_key_env: DIFY_API_KEY
  #   user: vox-radio            # 利用者を見分ける名前（省略すると vox-radio）
  #   inputs:                    # Dify アプリに渡す追加の値（省略可）
  #     temperature: "${temperature}"   # 完全一致なので数値で送信
  #     lang: ja

# 文章を音声に変換する VOICEVOX の接続設定。
voicevox:
  # VOICEVOX Engine のURL。
  # 環境変数 VOX_RADIO_VOICEVOX_URL を設定すると、この値より優先して上書きされます。
  # devcontainer では VOX_RADIO_VOICEVOX_URL が自動設定されるため、この値の変更は不要です。
  url: http://localhost:50021
  # 声の抑揚・高さ・速さの呼び名を数値に対応づけます（省略すると組み込みの標準セットを使用）。
  presets:
    intonation:   # 抑揚の強さ（小さいほど棒読み、大きいほど豊かに。0.0〜2.0）
      棒読み: 0.0
      かなり控えめ: 0.3
      控えめ: 0.6
      標準: 1.0
      やや豊か: 1.2
      表現豊か: 1.5
      とても豊か: 1.8
    pitch:        # 声の高さ（マイナスで低く、プラスで高く。-0.15〜0.15）
      低め: -0.05
      やや低め: -0.033
      わずかに低め: -0.017
      標準: 0.0
      わずかに高め: 0.017
      やや高め: 0.033
      高め: 0.05
    speed:        # 話す速さ（小さいほどゆっくり、大きいほど早口。0.5〜2.0）
      とてもゆっくり: 0.6
      ゆっくり: 0.8
      ややゆっくり: 0.9
      標準: 1.0
      やや早口: 1.1
      早口: 1.2
      とても早口: 1.4

# 過去回を覚えておくための設定。日替わりコーナーやゲストの「何回目か」の判定に使います。
# キャッシュは常に有効です（episode-spec.yaml の program.id がキーになります）。
cache:
  max_entries: 100         # 記憶しておく最大エピソード数（超えた分は古いものから消す）
  retention_days: 90       # 記憶を残す日数（超えた古いものは消す）
  llm_context_entries: 10  # AIに参考として渡す直近エピソード数

# Slack へ配信するときの設定（slackpost コマンドで使用）。
slack:
  # Slack の Bot トークン（xoxb-... ）を入れておく環境変数の名前。
  # 例: export SLACK_BOT_TOKEN=xoxb-xxx で設定します。
  # 必要な権限: chat:write / files:write
  bot_token_env: SLACK_BOT_TOKEN

# 登場キャラクターの設定（VOICEVOX の話者と結びつけます）。
# ここのキー（zundamon など）を episode-spec.yaml の casts / cast で使います。
characters:
  zundamon:
    name: ずんだもん
    pronoun: ボク
    speech_suffix: ["〜のだ", "〜なのだ"]
    personality: ["元気", "明るい", "素直", "前向き", "おっちょこちょい", "好奇心旺盛"]
    # 標準で使う声の種類（styles のキーと同じ名前にします）。
    default_style: ノーマル
    # 声の種類の名前と VOICEVOX の話者番号の対応。
    styles:
      ノーマル: 3
      あまあま: 1
      ツンツン: 7
      セクシー: 5
      ささやき: 22
      ヒソヒソ: 38
      ヘロヘロ: 75
      なみだめ: 76
  zunko:
    name: 東北ずん子
    pronoun: 私
    speech_suffix: ["〜です", "〜ます"]
    personality: ["前向き", "明るい", "母性の塊", "穏やか"]
    default_style: ノーマル
    styles:
      ノーマル: 107
  metan:
    name: 四国めたん
    pronoun: わたくし
    speech_suffix: ["〜かしら", "〜だわ", "〜ですわ"]
    personality: ["お嬢様", "しっかり者", "気まぐれ", "負けず嫌い", "世話好き"]
    default_style: ノーマル
    styles:
      ノーマル: 2
      あまあま: 0
      ツンツン: 6
      セクシー: 4
      ささやき: 36
      ヒソヒソ: 37
