# episode-spec.yaml - エピソード仕様ファイル
# このファイルを編集して番組の構成・コーナー・音声素材のパスを設定してください。
# vox-radio episodegen --spec episode-spec.yaml で実行できます。

# 番組全体の設定
program:
  # 番組ID（キャッシュキー兼ファイル名に使用。未設定時はキャッシュ無効）
  # id: "my-tech-radio"
  # 番組タイトル
  title: "番組タイトル"
  # 番組の説明（LLM への指示に使用）
  description: "番組の説明"
  # 番組全体サマリーの目安文字数（任意。未指定時はデフォルト 200 文字）
  # summary_length: 200

# コーナー定義（番組を構成する各コーナーを順番に記述）
corners:
  - title: "オープニング"
    # コーナーの内容説明（LLM への指示に使用）
    content: "番組の挨拶と本日のトピック紹介"
    # 演出生成 LLM のみに渡る演出専用指示。台本生成には渡らない。（不要な場合は行ごと削除）
    # direction: "明るく元気に。BGM はフェードインで開始。"
    # 出演キャラクター（キャラクターID: 役割の説明）
    # キャラクターIDは vox-radio.yaml の characters のキーと一致させること
    cast:
      zundamon: "元気に挨拶する進行役"
    # このコーナーの目標時間（秒）
    length_sec: 30
    # コーナーサマリーの目安文字数（任意。未指定時はデフォルト 100 文字）
    # summary_length: 100
    # コーナー開始ジングル（assets.jingle のキー名。不要な場合は行ごと削除）
    # start_jingle: opening
    # コーナー開始前の無音時間（秒）。0 または省略時は挿入しない。
    # start_pause_sec: 1.0
    # コーナー終了後の無音時間（秒）。0 または省略時は挿入しない。
    # end_pause_sec: 1.0

  - title: "メインコーナー"
    content: "メインコンテンツの紹介"
    cast:
      zundamon: "進行役"
      metan: "解説役"
    length_sec: 180
    # コーナーサマリーの目安文字数（任意。未指定時はデフォルト 100 文字）
    # summary_length: 100
    # コーナー中BGM（assets.bgm のキー名。不要な場合は行ごと削除）
    # bgm: talk_bgm
    # ソース設定（RSSフィードや記事URLからコンテンツを収集する場合に設定）
    # ソースがない場合はこのブロックを省略してください
    source:
      feeds:
        - url: https://example.com/feed
          max_items: 5
      articles: []
    # 出現条件（省略すると毎回出る固定コーナー）
    # condition を設定すると、回番号が合致したときのみ採用される
    # condition:
    #   episodes: [1, 3, 5]    # 第1・3・5回に採用（明示リスト）
    #   every: 2               # 偶数回に採用（周期指定）
    #   # episodes と every は両方指定すると論理和（どちらかに合致すれば採用）
    #   not:                   # この条件に合致する回を除外（補集合）
    #     every: 5             # 例: 5の倍数回を除く → 5以外の偶数回に採用
    #   # not 単独指定（episodes/every を省略）すると「合致しない回すべて」を表現できる
    #   # condition:
    #   #   not:
    #   #     every: 2         # 奇数回に採用（偶数でない回すべて）

  - title: "エンディング"
    content: "まとめと締め"
    cast:
      zundamon: "進行役"
    length_sec: 30
    # コーナーサマリーの目安文字数（任意。未指定時はデフォルト 100 文字）
    # summary_length: 100
    # コーナー終了ジングル（assets.jingle のキー名。不要な場合は行ごと削除）
    # end_jingle: ending

# アセット設定ファイルの参照（ジングル・SE・BGM）
# バイナリ素材ファイルは別途用意してください。
# アセット設定ファイルのパスはこのエピソード仕様ファイルからの相対パスで解決されます。
# 素材ファイルのパスはアセット設定ファイルのディレクトリを基準に解決されます。
# 複数ファイルを指定した場合は後勝ちでマージされます。
# 素材が不要な場合はこのセクション全体をコメントアウトするか削除してください。
# assets_files:
#   - assets/assets.yaml
# アセット設定ファイル（assets/assets.yaml）の内容例:
# jingle:
#   opening:
#     file: jingle/opening.mp3
#     fade_in: 0.5
#     fade_out: 0.5
#     # trim_silence: false  # 省略時は true（素材前後の無音を自動除去）。無効にしたい場合のみ記載
#     description: "番組冒頭で流すオープニングジングル"  # 省略可
#   ending:
#     file: jingle/ending.mp3
#     fade_in: 0.5
#     fade_out: 1.0
#     # trim_silence: false  # 省略時は true
# se:
#   chime:
#     file: se/chime.wav
#     volume: 0.8
#     # trim_silence: false  # 省略時は true（素材前後の無音を自動除去）。無効にしたい場合のみ記載
#     # overlay: true  # 省略時は false（SE が鳴り終わってから次のセリフを再生）。セリフに重ねたい場合のみ true
#     description: "話題の切り替わりに鳴らす明るいチャイム音"  # 省略可
#   transition:
#     file: se/transition.wav
#     volume: 0.8
#     # trim_silence: false  # 省略時は true
#     # overlay: true  # 省略時は false（順次再生）
# bgm:
#   talk_bgm:
#     file: bgm/talk.mp3
#     volume: 0.3
#     duck_ratio: 8
#     loop: true
#     # fade_in: 1.0   # フェードイン秒数（省略時デフォルト 1.0 秒）
#     # fade_out: 1.0  # フェードアウト秒数（省略時デフォルト 1.0 秒）。0 指定でフェードなし
#     description: "雑談向けの落ち着いたBGM"  # 省略可
