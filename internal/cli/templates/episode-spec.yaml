# episode-spec.yaml - 番組の中身（コーナーの並び・長さ・台本づくりの指示）を決めるファイルです。
# このファイルを編集して番組の構成・コーナー・音声素材のパスを設定してください。
# vox-radio episodegen --spec episode-spec.yaml で番組を作れます。
# すぐ動くサンプル一式がほしいときは vox-radio init --sample で sample/ に生成できます。

# 番組全体の設定。
program:
  # 番組を見分けるためのID【必須】。過去回の記憶（キャッシュ）の保存名や配信フィードの突き合わせに使います。
  # 日替わりコーナーやゲストの「何回目か」もこのIDをキーに数えます。
  id: "my-tech-radio"
  # 番組タイトル。
  title: "番組タイトル"
  # 番組の作者名（省略可）。生成 MP3 のアーティストタグ（ID3 TPE1）に埋め込まれます。
  # author: "制作チーム名"
  # 番組の説明（台本づくりの方向性として使われます）。
  description: "番組の説明"
  # 番組全体の演出方針（省略可）。SE・pause の挿入タイミングに関する指示。direct（音響演出）ステップのみに渡る。
  # direction: "オープニングジングル後は必ずSEを流す。"
  # 番組全体の台本指示（省略可）。write（台本生成）ステップのみに渡る。RSSフィード・Slack通知には露出しない非公開フィールド。
  # script_note: "記事を紹介する場合は記事タイトルを正確に伝えること。"
  # 番組まとめ文のおおよその文字数（省略すると 200 文字）。
  # summary_length: 200

# 出演者の一覧（番組に登場するキャラクターをここで宣言します）。
# キーは vox-radio.yaml の characters のキーと合わせてください。
# 下の corners[].cast に書くキャラは、必ずここで宣言してください。
casts:
  zundamon:
    type: regular            # regular = 毎回出演 / guest = 決まった回だけ出演
    role: "MC。進行役。ボケ担当。"  # 番組全体での役割（台本づくりに渡します）
    # condition を書かなければ毎回出演（regular の標準）
  metan:
    type: regular
    role: "MC。相棒。ツッコミ担当。"
    # お休みさせる例（5回目だけ出演しない）:
    # condition:
    #   not:
    #     episodes: [5]
  # ゲストの例（guest は condition が必須）:
  # zunko:
  #   type: guest
  #   role: 古参リスナー出身の常連ゲスト
  #   condition:
  #     episodes: [3, 10, 20]   # 第3,10,20回に出演（出る回を直接指定）
  # --- 3人のゲストを順番に出す例（every + offset で均等に分担）---
  # guest_a: { type: guest, role: ゲストA, condition: { every: 3, offset: 1 } }  # 3回おきに出演、初回は1回目。→ 第1,4,7,…回に登場。
  # guest_b: { type: guest, role: ゲストB, condition: { every: 3, offset: 2 } }  # 3回おきに出演、初回は2回目。→ 第2,5,8,…回に登場。
  # guest_c: { type: guest, role: ゲストC, condition: { every: 3, offset: 0 } }  # 3回おきに出演、初回は3回目。→ 第3,6,9,…回に登場。

# コーナーは書いた順に放送されます。
corners:
  - id: "opening"
    # コーナーを回をまたいで同定する id【必須・番組内で一意】。
    # 過去回の扱い回数（新コーナー/久しぶりの復活コーナー）の演出に使います。タイトルを変えても id で履歴を追えます。
    title: "オープニング"
    # コーナーの内容説明（台本づくりに渡します）。
    content: "番組の挨拶と本日のトピック紹介"
    # 演出方針（省略可）。direct（音響演出）ステップのみに渡る。台本本文には使われません。
    # direction: "明るく元気に。BGM はフェードインで開始。"
    # コーナー個別の台本指示（省略可）。write（台本生成）ステップのみに渡る。非公開フィールド。
    # script_note: "挨拶は「こんにちは」で統一すること。"
    # このコーナーでの役割（キーは casts に宣言済みのものだけ）。
    # 省略すると番組全体の役割（casts[].role）だけが使われます。
    cast:
      zundamon: "このコーナーでの役割（省略可）"
    # このコーナーのおおよその長さ（秒）。
    length_sec: 30
    # コーナーまとめ文のおおよその文字数（省略すると 100 文字）。
    # summary_length: 100
    # コーナーの始まりに鳴らす音（不要なら行ごと削除）。
    # start_audio:
    #   type: jingle   # jingle（BGMを止めて再生）または se（BGMの下で再生）
    #   id: opening    # assets の該当する種類のキー名
    # コーナーが始まる前に入れる無音（秒）。0 か省略で入れません。
    # start_pause_sec: 1.0
    # コーナーが終わった後に入れる無音（秒）。0 か省略で入れません。
    # end_pause_sec: 1.0

  - id: "main"
    title: "メインコーナー"
    content: "メインコンテンツの紹介"
    cast:
      zundamon: "ボケ担当。あまり詳しくない設定。"
      metan: "解説役。ツッコミ担当。"
    length_sec: 180
    # コーナーまとめ文のおおよその文字数（省略すると 100 文字）。
    # summary_length: 100
    # コーナー中ずっと流す背景音楽（assets.bgm のキー名。不要なら行ごと削除）。
    # bgm: talk_bgm
    # 記事の取得元（RSSフィードや記事URLから内容を集めたいときに設定）。
    # 取得元が不要なコーナーはこのブロックごと省略してください。
    source:
      feeds:
        - url: https://example.com/feed
          max_items: 5
      articles: []
    # 放送する回の条件（省略すると毎回放送される固定コーナー）。
    # condition を書くと、回番号が合ったときだけ放送されます。
    # condition:
    #   episodes: [1, 3, 5]    # 第1,3,5回に放送（放送する回を直接指定）
    #   every: 2               # 偶数回に放送（周期で指定）
    #   # episodes と every を両方書くと「どちらかに合えば放送」
    #   not:                   # ここに合う回は放送しない（除外）
    #     every: 5             # 例: 5の倍数回を除く → 5以外の偶数回に放送
    #   # not だけ書く（episodes/every を省く）と「合わない回すべて」を表せます
    #   # condition:
    #   #   not:
    #   #     every: 2         # 奇数回に放送（偶数でない回すべて）
    # --- 3つのコーナーを順番に放送する例（every + offset で均等に分担）---
    # コーナーA: condition: { every: 3, offset: 1 }  # 3回おきに放送、初回は1回目。→ 第1,4,7,…回に放送。
    # コーナーB: condition: { every: 3, offset: 2 }  # 3回おきに放送、初回は2回目。→ 第2,5,8,…回に放送。
    # コーナーC: condition: { every: 3, offset: 0 }  # 3回おきに放送、初回は3回目。→ 第3,6,9,…回に放送。

  - id: "ending"
    title: "エンディング"
    content: "まとめと締め"
    cast:
      zundamon: "進行役"
    length_sec: 30
    # コーナーまとめ文のおおよその文字数（省略すると 100 文字）。
    # summary_length: 100
    # コーナーの終わりに鳴らす音（不要なら行ごと削除）。
    # end_audio:
    #   type: jingle   # jingle または se
    #   id: ending     # assets の該当する種類のキー名

# 効果音やBGMの設定ファイル（ジングル・SE・BGM）の参照。
# 音声ファイル（mp3 など）は別途自分で用意してください。
# 設定ファイルのパスは、このファイルがある場所を基準に探します。
# 音声ファイルのパスは、その設定ファイルがある場所を基準に探します。
# 複数のファイルを指定した場合は、後に書いたものが優先されます。
# 書き方の例は assets/assets.yaml のコメントを参照してください。
# 効果音やBGMが不要なら assets_files をコメントアウトするか削除してください。
assets_files:
  - assets/assets.yaml
