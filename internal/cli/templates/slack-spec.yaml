# slack-spec.yaml - 番組を Slack に投稿するための設定です。
# vox-radio slackpost --manifest (manifest.jsonのパス) --spec slack-spec.yaml で
# mp3 を Slack にアップロードし、要約やコーナーをスレッドに投稿します。
# Slack のトークンは vox-radio.yaml の slack.bot_token_env で指定した環境変数から読み込みます。

# Slack 投稿の設定。
slack:
  # 投稿先チャンネル ID を保持する環境変数名（必須）。
  # 実行時に指定した環境変数からチャンネル ID（"C" で始まる文字列）を取得します。
  channel_env: SLACK_CHANNEL_ID

  # 投稿文テンプレートのファイルパス（省略すると組み込みのデフォルトテンプレートを使います）。
  # パスは slack-spec.yaml のディレクトリ基準の相対パスか絶対パスで指定します。
  # vox-radio init で template/slack-parent.tmpl・template/slack-thread.tmpl が同時に生成されます。
  # テンプレートは Go 標準の text/template 記法を使います。
  # 利用可能な関数:
  #   corner "<id>"        — 指定 ID のコーナーを返す（見つからない場合は nil）
  #   hasLinks <corner>    — コーナーに URL 付き記事が 1 件以上あれば true
  message:
    # 親メッセージ（mp3 アップロード時の最初のコメント）のテンプレートファイル。
    parent: "template/slack-parent.tmpl"
    # スレッド返信（要約＋コーナー）のテンプレートファイル。3000文字超は自動分割されます。
    thread: "template/slack-thread.tmpl"
    # スレッド通知用プレーンテキストのテンプレートファイル（省略可）。
    # fallback: "template/slack-fallback.tmpl"
