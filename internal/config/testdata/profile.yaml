program:
  title: "テストニュース"
  description: "テスト用"
  segment_pause_sec: 0.3
  target_duration_sec: 75
  opening_jingle: opening
  ending_jingle: ending

corners:
  - title: "オープニング"
    content: "番組の挨拶とトピック紹介"
    cast:
      zundamon: "元気に挨拶する進行役"
    target_duration_sec: 45
  - title: "ニュースコーナー"
    content: "テック記事を紹介"
    cast:
      zundamon: "司会"
    target_duration_sec: 30
    source:
      feeds:
        - url: https://example.com/rss.xml
          max_items: 3
      articles:
        - https://example.com/articles/1

assets:
  jingle:
    opening: { file: assets/jingle/opening.mp3, fade_in: 0.5, fade_out: 0.5, description: "番組冒頭で流すオープニングジングル" }
    ending:  { file: assets/jingle/ending.mp3,  fade_in: 0.5, fade_out: 1.0 }
  se:
    chime: { file: assets/se/chime.wav, volume: 0.8, description: "話題の切り替わりに鳴らす明るいチャイム音" }
  bgm:
    talk_bgm: { file: assets/bgm/talk.mp3, volume: 0.3, duck_ratio: 8, loop: true, description: "雑談向けの落ち着いたBGM" }
