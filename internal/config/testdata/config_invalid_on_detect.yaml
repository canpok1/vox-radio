llm:
  provider: openai
  temperature: 0.7
  max_retries: 3
  steps:
    summarize: { temperature: 0.2 }
  openai:
    base_url: https://example.com/v1/
    api_key_env: OPENAI_API_KEY
    model: gpt-4o

voicevox:
  url: http://localhost:50021

characters:
  zundamon:
    name: ずんだもん
    pronoun: ボク
    speech_suffix: ["〜のだ"]
    personality: ["元気"]
    default_style: ノーマル
    styles:
      ノーマル: 3

security:
  prompt_injection:
    on_detect: invalid_value
