llm:
  provider: dify-chat
  temperature: 0.7
  max_retries: 3
  steps:
    summarize: { temperature: 0.2 }
    write:     { temperature: 0.8 }
  dify-chat:
    base_url: https://api.dify.ai/v1
    api_key_env: DIFY_API_KEY
    user: vox-radio
    inputs:
      temperature: "${temperature}"
      lang: ja

voicevox:
  url: http://localhost:50021

characters:
  zundamon:
    name: ずんだもん
    pronoun: ボク
    speech_suffix: ["〜のだ", "〜なのだ"]
    personality: ["元気", "明るい"]
    default_style: ノーマル
    styles:
      ノーマル: 3
