# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    # GoReleaser の before hook はシェルを介さず実行されるためリダイレクトが効かない。
    # また dist 配下は hook 後の空チェックに引っかかるため、dist の外へ出力する。
    - mkdir -p .extra-files
    - sh -c "sed 's/__VERSION__/{{ .Tag }}/g' scripts/install.sh > .extra-files/install.sh"
    # sample-assets を zip 化して Release へ自動添付する。
    # zip 直下に assets.yaml・jingle/se/bgm・README/CREDITS が並ぶよう sample-assets 配下で実行する。
    - sh -c "rm -f .extra-files/vox-radio-sample-assets.zip && cd sample-assets && zip -r ../.extra-files/vox-radio-sample-assets.zip ."

builds:
  - id: vox-radio
    main: ./cmd/vox-radio
    binary: vox-radio
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/canpok1/vox-radio/internal/cli.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

dockers:
  - id: vox-radio-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/canpok1/vox-radio:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/canpok1/vox-radio"
      - "--label=org.opencontainers.image.licenses=MIT"
  - id: vox-radio-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/canpok1/vox-radio:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/canpok1/vox-radio"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/canpok1/vox-radio:{{ .Version }}"
    image_templates:
      - "ghcr.io/canpok1/vox-radio:{{ .Version }}-amd64"
      - "ghcr.io/canpok1/vox-radio:{{ .Version }}-arm64"
  - name_template: "ghcr.io/canpok1/vox-radio:latest"
    image_templates:
      - "ghcr.io/canpok1/vox-radio:{{ .Version }}-amd64"
      - "ghcr.io/canpok1/vox-radio:{{ .Version }}-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  extra_files:
    - glob: .extra-files/install.sh
    - glob: .extra-files/vox-radio-sample-assets.zip
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

homebrew_casks:
  - repository:
      owner: canpok1
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    dependencies:
      - formula: ffmpeg
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/{{ .ProjectName }}"]
          end
