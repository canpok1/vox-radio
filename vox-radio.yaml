llm:
  base_url: https://generativelanguage.googleapis.com/v1beta/openai/
  api_key_env: GEMINI_API_KEY
  model: gemini-3.1-flash-lite
  temperature: 0.7
  max_retries: 3
  min_request_interval_ms: 4500
  steps:
    summarize: { temperature: 0.2 }
    plan:      { temperature: 0.4 }
    write:     { temperature: 0.8 }
    direct:    { temperature: 0.2 }

voicevox:
  url: http://voicevox:50021

characters:
  zundamon:
    name: ずんだもん
    pronoun: ボク
    speech_suffix: ["〜のだ", "〜なのだ"]
    personality: ["元気", "明るい", "素直", "前向き", "おっちょこちょい", "好奇心旺盛"]
    default_style: ノーマル
    styles:
      ノーマル: 3
      あまあま: 1
      ツンツン: 7
      セクシー: 5
      ささやき: 22
      ヒソヒソ: 38
      ヘロヘロ: 75
      なみだめ: 76
  zunko:
    name: 東北ずん子
    pronoun: 私
    speech_suffix: ["〜です", "〜ます"]
    personality: ["前向き", "明るい", "母性の塊", "穏やか"]
    default_style: ノーマル
    styles:
      ノーマル: 107
  metan:
    name: 四国めたん
    pronoun: わたくし
    speech_suffix: ["〜かしら", "〜だわ", "〜ですわ"]
    personality: ["お嬢様", "しっかり者", "気まぐれ", "負けず嫌い", "世話好き"]
    default_style: ノーマル
    styles:
      ノーマル: 2
      あまあま: 0
      ツンツン: 6
      セクシー: 4
      ささやき: 36
      ヒソヒソ: 37
